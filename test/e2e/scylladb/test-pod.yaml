# kubectl create secret -n testpod generic testpod-config --from-file ca.crt=./nebula-config/ca.crt --from-file host.crt=./nebula-config/lighthouse1.crt --from-file host.key=./nebula-config/lighthouse1.key --from-file config.yml=./nebula-conf-lighthouse.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: testpod

---

apiVersion: v1
kind: Pod
metadata:
  name: testpod1
  namespace: testpod
  labels:
    testpod: testpod
spec:
  containers:
  - name: nebula
    image: nebulaoss/nebula
    volumeMounts:
    - name: config
      mountPath: /config
      readOnly: true
    securityContext:
      capabilities:
        add: ["NET_ADMIN"]
    ports:
    - name: nebula
      containerPort: '4242'
      protocol: UDP
  volumes:
  - name: config
    secret:
      secretName: testpod-config

----

apiVersion: v1
kind: Service
metadata:
  name: ipfs-rpc
  namespace: ipfs
spec:
  ports:
  - name: nebula
    port: 0
    targetPort: nebula
  clusterIP: None
  selector:
    testpod: testpod
